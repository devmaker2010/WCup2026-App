<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Prode Mundial 2026</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prode 2026">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2d7a35">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --verde:        #1a6b2e;
  --verde2:       #145523;
  --verde3:       #0e3d19;
  --verde4:       #0a2e12;
  --verde-claro:  #2a8a3e;
  --verde-neon:   #39d160;
  --wc-rojo:      #e8192c;
  --wc-rojo2:     #ff3347;
  --wc-dorado:    #c8960c;
  --wc-dorado2:   #f5c842;
  --wc-blanco:    #ffffff;
  --text:  #ffffff;
  --text2: #b8f0c8;
  --text3: #78a888;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  color: var(--text);
  background-color: #1a6b2e;
  background-image:
    repeating-linear-gradient(
      180deg,
      transparent,
      transparent 60px,
      rgba(0,0,0,0.08) 60px,
      rgba(0,0,0,0.08) 120px
    ),
    radial-gradient(ellipse 90% 50% at 50% 0%, rgba(57,209,96,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 70% 40% at 0% 100%, rgba(232,25,44,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 100% 80%, rgba(245,200,66,0.06) 0%, transparent 50%),
    linear-gradient(160deg, #145523 0%, #1a6b2e 40%, #2a8a3e 100%);
  background-attachment: fixed;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

.box {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(232,25,44,0.35);
  border-radius: 24px;
  padding: 3rem 2rem;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(232,25,44,0.1);
}

.icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  display: block;
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%       { transform: scale(1.08); opacity: 0.8; }
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #ffffff 0%, var(--wc-dorado2) 55%, var(--wc-rojo2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
  margin-bottom: 0.4rem;
}

.subtitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  letter-spacing: 5px;
  color: var(--wc-rojo2);
  text-shadow: 0 0 20px rgba(232,25,44,0.5);
  margin-bottom: 1.8rem;
}

.divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--wc-rojo2), transparent);
  margin: 0 auto 1.8rem;
  border-radius: 2px;
}

.message {
  color: var(--text2);
  font-size: 0.88rem;
  letter-spacing: 1px;
  line-height: 1.7;
}

.badge {
  display: inline-block;
  margin-top: 1.8rem;
  background: rgba(232,25,44,0.12);
  border: 1px solid rgba(232,25,44,0.3);
  border-radius: 20px;
  padding: 0.4rem 1.2rem;
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #ff8899;
}

.logo-line {
  margin-top: 2rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 3px;
  color: var(--text3);
}
</style>
</head>
<body>

<div class="box">
  <span class="icon">🚫</span>

  <div class="title">Fuera de Servicio</div>
  <div class="subtitle">Juego CANCELADO</div>

  <div class="divider"></div>

  <p class="message">
    El juego no está disponible en este momento.<br>
    Gracias por participar.
  </p>

  <div class="badge">⚽ Prode Mundial 2026</div>

  <div class="logo-line">🏆 &nbsp; Mundial 2026 &nbsp; 🏆</div>
</div>

</body>
</html>
